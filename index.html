<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iPlayground 主辦模擬器</title>
<meta name="description" content="日式文字遊戲風的肉鴿抽卡小遊戲：扮演 iPlayground 總召，9 週內湊齊講者陣容、宣傳售票，成功舉辦一場 350 人滿員的研討會！">
<meta property="og:title" content="iPlayground 主辦模擬器">
<meta property="og:description" content="扮演 iPlayground 總召，9 週內湊齊講者、宣傳售票，辦出一場 350 人滿員的研討會！">
<meta property="og:type" content="website">
<meta property="og:image" content="images/og.jpg"><!-- 部署後改成絕對網址 -->
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="frame">
  <header class="masthead">
    <span class="logo">iPLAYGROUND <span class="yr">SIM</span></span>
    <span class="role-tag" id="roleTag"></span>
    <button class="lang-btn" id="langToggle">EN</button>
  </header>

  <div class="bars">
    <div class="bar-block">
      <div class="bar-label" id="timeL"></div>
      <div class="bar"><div class="bar-fill time" id="timeFill"></div></div>
    </div>
    <div class="bar-block" style="flex:1.4 1 240px;">
      <div class="bar-label" id="crowdL"></div>
      <div class="bar"><div class="bar-fill crowd" id="crowdFill"></div><div class="bar-mark" style="left:57.14%;"></div></div>
    </div>
    <div class="ap-block">
      <div class="bar-label" id="apL"></div>
      <div class="ap-pips" id="apPips"></div>
    </div>
  </div>

  <div class="scene-row">
    <div class="scene">
      <div class="scene-art" id="sceneArt"></div>
      <div class="msgwin" id="msgwin">
        <div class="msg-tag" id="msgTag"></div>
        <div class="msg-text" id="msgText"></div>
        <div class="msg-choices" id="msgChoices"></div>
        <div class="msg-adv" id="msgAdv" style="display:none;">▼</div>
      </div>
    </div>
    <div class="side">
      <button class="side-btn" id="sbBinder"><span class="ico">🃏</span><span id="sbBinderL"></span></button>
      <button class="side-btn" id="sbLineup"><span class="ico">🎤</span><span id="sbLineupL"></span></button>
      <button class="side-btn" id="sbLog"><span class="ico">📓</span><span id="sbLogL"></span></button>
      <div class="side-note" id="pityHint"></div>
    </div>
  </div>

  <div class="commands">
    <button class="cmd primary" id="actInvite"><span id="actInviteL"></span><small id="inviteSub"></small></button>
    <button class="cmd" id="actStaff"><span id="actStaffL"></span><small id="staffSub"></small></button>
    <button class="cmd" id="actPromo"><span id="actPromoL"></span><small id="promoSub"></small></button>
    <button class="cmd" id="actAnnounce"><span id="actAnnounceL"></span><small id="announceSub"></small></button>
    <button class="cmd" id="actInterview"><span id="actInterviewL"></span><small id="interviewSub"></small></button>
    <button class="cmd endw" id="endWeek"><span id="endWeekL"></span><small id="endWeekSub"></small></button>
  </div>

  <div class="cta-row">
    <a class="cta primary" id="ctaTicket" href="https://iplayground.kktix.cc/events/2026" target="_blank" rel="noopener"></a>
    <a class="cta ghost" id="ctaSite" href="https://iplayground.io/2026/" target="_blank" rel="noopener"></a>
  </div>
</div>

<!-- 首頁（滿版） -->
<div class="overlay show" id="titleOverlay">
  <div class="title-page">
    <div class="t-bg" id="tBg"></div>
    <div class="t-dim"></div>
    <div class="t-content">
      <div class="t-logo">iPLAYGROUND <span class="yr">SIM</span></div>
      <h3 id="tTitle"></h3>
      <div class="t-sub" id="tSub"></div>
      <div class="t-menu" id="tMenu">
        <button class="btn" id="tStart"></button>
        <button class="btn ghost" id="tLang"></button>
        <button class="btn ghost" id="tDiff"></button>
      </div>
      <div class="t-diff" id="tDiffMenu" style="display:none;">
        <button class="btn ghost diff-opt" id="dEasy"></button>
        <button class="btn ghost diff-opt" id="dNormal"></button>
        <button class="btn ghost diff-opt" id="dHard"></button>
        <button class="btn ghost" id="tDiffBack"></button>
      </div>
    </div>
  </div>
</div>

<!-- 開場：輸入名字 -->
<div class="overlay" id="introOverlay">
  <div class="modal" id="introStep1">
    <div class="intro-top"><button class="lang-btn" id="introLang">EN</button></div>
    <p class="eyebrow" id="iEyebrow1"></p>
    <div class="art-slot" id="introArt"></div>
    <h3 id="iTitle1"></h3>
    <p class="desc" id="iDesc1"></p>
    <input class="name-input" id="nameInput" maxlength="12" autocomplete="off">
    <div class="btn-row"><button class="btn" id="nameOk"></button></div>
  </div>
  <div class="modal" id="introStep2" style="display:none;">
    <p class="eyebrow">Mission Briefing</p>
    <h3 id="greetTitle"></h3>
    <div class="brief-cols">
      <div>
        <p class="desc" id="briefLead"></p>
        <ul class="goal-list" id="goalList"></ul>
      </div>
      <div>
        <div class="callout" id="c200"></div>
        <div class="callout" id="cTags"></div>
        <div class="callout" id="apNote"></div>
        <p class="desc" id="briefDesc"></p>
        <p class="cheer" id="cheerLine"></p>
      </div>
    </div>
    <div class="btn-row"><button class="btn" id="introStart"></button></div>
  </div>
</div>

<!-- 操作說明（進主畫面前） -->
<div class="overlay" id="helpOverlay">
  <div class="modal" id="helpModal">
    <p class="eyebrow" id="helpEyebrow"></p>
    <h3 id="helpTitle"></h3>
    <div class="help-rows" id="helpRows"></div>
    <div class="btn-row"><button class="btn" id="helpOk"></button></div>
  </div>
</div>

<!-- 轉盤（抽卡時彈出） -->
<div class="overlay" id="wheelOverlay">
  <div class="wheel-overlay-inner">
    <div class="wheel-mode" id="wheelMode"></div>
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel" aria-label="wheel"></canvas>
    </div>
  </div>
</div>

<!-- 抽卡結果（gacha 卡，樣式移植自講者抽抽樂） -->
<div class="overlay" id="cardOverlay">
  <div class="speaker-card" id="cardModal">
    <button class="card-close" id="cardClose" aria-label="close">✕</button>
    <div class="card-photo" id="cardPhoto">
      <p class="card-eyebrow" id="cardEyebrow"></p>
    </div>
    <div class="card-body">
      <h3 class="card-name" id="cardName"></h3>
      <p class="card-title" id="cardTitle"></p>
      <div class="badges" id="cardBadges"></div>
      <p class="card-intro clamp" id="cardIntro"></p>
      <p class="intro-more" id="introMore"></p>
      <div class="card-sessions" id="cardSessions"></div>
      <div class="card-effect" id="cardEffect"></div>
    </div>
    <div class="card-foot"><button class="btn" id="cardOk"></button></div>
  </div>
</div>

<!-- 宣傳成果 -->
<div class="overlay" id="promoOverlay">
  <div class="modal">
    <p class="eyebrow" id="promoEyebrow"></p>
    <h3 id="promoTitle"></h3>
    <div class="art-slot" id="promoArt"></div>
    <div class="big-num" id="promoNum"></div>
    <p class="desc" id="promoNote" style="text-align:center;"></p>
    <div class="btn-row"><button class="btn" id="promoOk"></button></div>
  </div>
</div>

<!-- 公布議程結果 -->
<div class="overlay" id="annOverlay">
  <div class="modal">
    <p class="eyebrow" id="annEyebrow"></p>
    <h3 id="annTitle"></h3>
    <div class="art-slot" id="annArt"></div>
    <div class="ann-rows" id="annRows"></div>
    <div class="ann-total"><span id="annTotalL"></span><span class="vl" id="annTotal"></span></div>
    <p class="ann-note" id="annNote"></p>
    <div class="btn-row"><button class="btn" id="annOk"></button></div>
  </div>
</div>

<!-- 卡冊（右側 sidebar） -->
<div class="overlay" id="binderOverlay">
  <div class="drawer">
    <p class="eyebrow" id="binderT"></p>
    <div class="coll-sub" id="collSpL"></div>
    <div class="coll-grid" id="collSpeakers"></div>
    <div class="coll-sub" id="collStL"></div>
    <div class="coll-grid" id="collStaff"></div>
    <div class="legend" id="legendBinder"></div>
    <div class="btn-row"><button class="btn ghost" id="binderClose"></button></div>
  </div>
</div>

<!-- 講者陣容（右側 sidebar） -->
<div class="overlay" id="lineupOverlay">
  <div class="drawer">
    <p class="eyebrow" id="lineupT"></p>
    <div class="goals" id="goals"></div>
    <div class="hud-label" style="margin-bottom:6px;" id="tagDivL"></div>
    <div class="cats" id="cats"></div>
    <div class="staff-line" id="agendaLine"></div>
    <div class="staff-line" id="staffLine"></div>
    <div class="legend" id="legendLineup"></div>
    <div class="btn-row"><button class="btn ghost" id="lineupClose"></button></div>
  </div>
</div>

<!-- 籌備日誌（右側 sidebar） -->
<div class="overlay" id="logOverlay">
  <div class="drawer">
    <p class="eyebrow" id="logT"></p>
    <div class="log" id="log"></div>
    <div class="btn-row"><button class="btn ghost" id="logClose"></button></div>
  </div>
</div>

<!-- 深度專訪：選擇對象面板（卡冊樣式） -->
<div class="overlay" id="interviewOverlay">
  <div class="drawer">
    <p class="eyebrow" id="interviewT"></p>
    <p class="coll-sub" id="interviewHint"></p>
    <div class="coll-grid" id="interviewGrid"></div>
    <p class="coll-empty" id="interviewEmpty" style="display:none;"></p>
    <div class="btn-row"><button class="btn ghost" id="interviewClose"></button></div>
  </div>
</div>

<!-- 結算 -->
<div class="overlay" id="finaleOverlay">
  <div class="modal finale">
    <p class="eyebrow" id="finEyebrow"></p>
    <h3 id="finTitle"></h3>
    <div class="art-slot" id="finArt"></div>
    <div class="grade" id="finGrade"></div>
    <p class="desc" id="finDesc"></p>
    <div id="finAchievements"></div>
    <div class="score-rows" id="finScores"></div>
    <div class="slogan" id="finSlogan"></div>
    <div class="cta-row">
      <a class="cta primary" id="finTicket" href="https://iplayground.kktix.cc/events/2026" target="_blank" rel="noopener"></a>
      <a class="cta ghost" id="finSite" href="https://iplayground.io/2026/" target="_blank" rel="noopener"></a>
    </div>
    <div class="btn-row"><button class="btn" id="finRestart"></button></div>
  </div>
</div>

<!-- 手機直式提示 -->
<div class="rotate-hint" id="rotateHint">
  <div class="inner">
    <div class="phone">📱</div>
    <p id="rotateMsg"></p>
    <button id="rotateDismiss"></button>
  </div>
</div>

<canvas id="confetti" aria-hidden="true"></canvas>

<script src="data.js"></script>
<script src="game.js"></script>
</body>
</html>
