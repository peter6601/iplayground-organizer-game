<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iPlayground 主辦模擬器</title>
<meta name="description" content="日式文字遊戲風的肉鴿抽卡小遊戲：扮演 iPlayground 總召，9 週內湊齊講者陣容、宣傳售票，成功舉辦一場 350 人滿員的研討會！">
<meta property="og:title" content="iPlayground 主辦模擬器">
<meta property="og:description" content="扮演 iPlayground 總召，9 週內湊齊講者、宣傳售票，辦出一場 350 人滿員的研討會！">
<meta property="og:type" content="website">
<meta property="og:image" content="images/og.jpg"><!-- 部署後改成絕對網址 -->
<meta name="twitter:card" content="summary_large_image">
<style>
  :root {
    --bg: #000000;
    --panel: #111111;
    --panel-2: #1A1A1A;
    --ink: #FFFFFF;
    --muted: #666666;
    --soft: #D9D9D9;
    --neon: #D7FF00;
    --neon-dim: rgba(215, 255, 0, 0.28);
    --neon-faint: rgba(215, 255, 0, 0.10);
    --gold: #FFB800;
    --purple: #C084FC;
    --blue: #7DD3FC;
    --orange: #FF9E45;
    --sun: #FFD84D;
    --red: #FF5D5D;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, "PingFang TC", "Noto Sans TC", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); }
  body { margin: 0; font-family: var(--sans); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100vh; }
  .frame { max-width: 1020px; margin: 0 auto; padding: 18px 16px 40px; }

  /* ── masthead ── */
  .masthead { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
  .logo .yr { color: var(--neon); }
  .role-tag { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .role-tag b { color: var(--neon); }
  .lang-btn { margin-left: auto; background: transparent; color: var(--soft); border: 1px solid #333; border-radius: 999px;
    padding: 4px 14px; font-family: var(--sans); font-size: 12px; font-weight: 700; cursor: pointer; }
  .lang-btn:hover { border-color: var(--neon-dim); color: var(--ink); }

  /* ── bars ── */
  .bars { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
  .bar-block { flex: 1 1 200px; min-width: 180px; }
  .bar-label { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; font-variant-numeric: tabular-nums; }
  .bar-label b { color: var(--neon); }
  .bar { position: relative; height: 12px; border-radius: 6px; background: var(--panel); border: 1px solid #222; }
  .bar-fill { position: absolute; inset: 0 auto 0 0; border-radius: 6px; transition: width .5s ease; }
  .bar-fill.time { background: var(--gold); }
  .bar-fill.crowd { background: linear-gradient(90deg, #5a6b00, var(--neon)); }
  .bar-mark { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--red); opacity: .85; }
  .ap-block { flex: 0 0 auto; }
  .ap-pips { display: flex; gap: 5px; align-items: center; height: 12px; }
  .pip { width: 12px; height: 12px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 8px var(--neon-dim); }
  .pip.used { background: #222; box-shadow: none; }
  .ap-num { font-size: 12px; color: var(--muted); margin-left: 4px; font-variant-numeric: tabular-nums; }

  /* ── stage ── */
  .scene-row { display: flex; gap: 10px; }
  .scene { position: relative; flex: 1; border-radius: 12px; overflow: hidden; border: 1px solid #1e1e1e; background: #101418; }
  .scene-art, .scene-art svg, .scene-art img { width: 100%; display: block; }
  .scene-art img { object-fit: cover; aspect-ratio: 23/12; }
  /* 神秘講者來訪：剪影 → 點亮 */
  .scene-art .scene-sil { filter: brightness(0); }
  .scene-art .scene-reveal { animation: sceneLight .5s ease forwards; }
  @keyframes sceneLight { from { filter: brightness(0); } to { filter: none; } }
  @media (prefers-reduced-motion: reduce) { .scene-art .scene-reveal { animation: none; } }
  .msgwin { position: absolute; left: 10px; right: 10px; bottom: 10px; background: rgba(5,5,5,.86); border: 1px solid var(--neon-dim);
    border-radius: 10px; padding: 9px 13px 8px; min-height: 62px; cursor: pointer; user-select: none; }
  .msg-tag { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--neon); margin-bottom: 3px; min-height: 12px; }
  .msg-text { font-size: 14px; color: #EDEDE6; line-height: 1.55; min-height: 22px; }
  .msg-choices { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .msg-btn { background: var(--neon); color: #000; border: 0; border-radius: 8px; padding: 8px 14px;
    font-family: var(--sans); font-size: 13px; font-weight: 800; cursor: pointer; }
  .msg-btn.ghost { background: transparent; color: var(--soft); border: 1px solid #444; font-weight: 600; }
  .msg-adv { position: absolute; right: 12px; bottom: 6px; color: var(--neon); font-size: 12px; animation: bob 1s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3px); } }

  .side { width: 128px; display: flex; flex-direction: column; gap: 8px; }
  .side-btn { display: flex; align-items: center; gap: 8px; background: var(--panel-2); color: var(--soft); border: 1px solid #2a2a2a;
    border-radius: 10px; padding: 11px 12px; font-family: var(--sans); font-size: 13px; font-weight: 700; cursor: pointer; text-align: left; }
  .side-btn:hover { border-color: var(--neon-dim); color: var(--ink); }
  .side-btn .ico { color: var(--neon); }
  .side-note { margin-top: auto; font-size: 11px; color: var(--muted); line-height: 1.5; }
  .side-note .warn { color: var(--gold); }

  /* ── commands ── */
  .commands { display: flex; gap: 8px; margin-top: 10px; }
  .cmd { flex: 1; position: relative; display: flex; flex-direction: column; gap: 2px; align-items: center; text-align: center;
    background: var(--panel-2); color: var(--ink); border: 1px solid #262626; border-radius: 10px; padding: 10px 6px 8px;
    font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; transition: border-color .15s, transform .1s; }
  .cmd small { font-weight: 400; font-size: 11px; color: var(--muted); }
  .cmd:hover:not(:disabled) { border-color: var(--neon-dim); }
  .cmd:active:not(:disabled) { transform: scale(.97); }
  .cmd:disabled { opacity: .35; cursor: not-allowed; }
  .cmd.primary { border-color: var(--neon-dim); background: linear-gradient(180deg, #1c2402, var(--panel-2)); }
  .cmd.endw { border-style: dashed; color: var(--soft); }
  @media (max-width: 720px) {
    .scene-row { flex-direction: column; }
    .side { width: 100%; flex-direction: row; }
    .side-btn { flex: 1; justify-content: center; padding: 9px 6px; }
    .side-note { display: none; }
    .commands { flex-wrap: wrap; }
    .cmd { flex: 1 1 30%; }
  }

  /* ── overlays ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.82); display: none; place-items: center; z-index: 50; padding: 20px; }
  .overlay.show { display: grid; }
  .modal { width: min(500px, 94vw); max-height: 88vh; overflow-y: auto; background: var(--panel); border: 1px solid #262626;
    border-radius: 18px; padding: 24px; animation: pop .28s cubic-bezier(.2,1.4,.4,1); }
  @keyframes pop { from { transform: scale(.86); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .eyebrow { margin: 0 0 8px; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--neon); }
  .modal h3 { margin: 0 0 6px; font-size: 23px; font-weight: 800; line-height: 1.15; }
  .modal p.desc { margin: 8px 0 0; font-size: 14px; color: var(--soft); line-height: 1.7; }
  .modal .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .btn { flex: 1; background: var(--neon); color: #000; border: 0; border-radius: 10px; padding: 12px 16px;
    font-family: var(--sans); font-size: 15px; font-weight: 800; cursor: pointer; }
  .btn.ghost { background: transparent; color: var(--soft); border: 1px solid #333; font-weight: 600; }
  .btn:active { transform: scale(.98); }
  .art-slot { margin: 12px 0 4px; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
  .art-slot svg, .art-slot img { width: 100%; display: block; }
  .big-num { font-size: 52px; font-weight: 900; color: var(--neon); text-align: center; margin: 10px 0 2px; text-shadow: 0 0 24px var(--neon-dim); font-variant-numeric: tabular-nums; }
  .big-num.neg { color: var(--red); text-shadow: none; }

  /* wheel overlay */
  .wheel-overlay-inner { width: min(440px, 90vw); display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .wheel-wrap { position: relative; width: 100%; aspect-ratio: 1; }
  canvas#wheel { width: 100%; height: 100%; display: block; }
  .pointer { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 0; height: 0;
    border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid var(--neon);
    filter: drop-shadow(0 0 8px var(--neon-dim)); z-index: 2; }
  .wheel-mode { font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .wheel-mode b { color: var(--neon); }

  /* goals / cats（陣容 overlay） */
  .goals { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .goal { font-size: 12px; padding: 5px 10px; border-radius: 999px; border: 1px solid #2a2a2a; color: var(--muted); font-variant-numeric: tabular-nums; }
  .goal.ok { color: #000; background: var(--neon); border-color: var(--neon); font-weight: 700; }
  .cats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .cat { font-size: 12px; padding: 4px 9px; border-radius: 6px; border: 1px solid #2a2a2a; color: #555; }
  .cat.on { color: var(--neon); border-color: var(--neon-dim); background: var(--neon-faint); }
  .hud-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .staff-line { font-size: 13px; color: var(--soft); margin-top: 10px; line-height: 1.6; }
  .staff-line b { color: var(--neon); }

  /* 側欄（卡冊/講者陣容/籌備日誌；抽卡/卡片彈窗蓋在其上） */
  #cardOverlay, #wheelOverlay { z-index: 56; }
  #binderOverlay, #lineupOverlay, #logOverlay { padding: 0; }
  .drawer { position: absolute; right: 0; top: 0; bottom: 0; width: min(400px, 92vw);
    background: var(--panel); border-left: 1px solid #262626; padding: 20px 20px 26px; overflow-y: auto;
    animation: slideIn .22s ease; }
  @keyframes slideIn { from { transform: translateX(48px); opacity: 0; } to { transform: none; opacity: 1; } }
  .drawer .log { max-height: none; }
  .coll-sub { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
  .coll-sub + .coll-sub { margin-top: 14px; }
  .coll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); gap: 10px; margin-bottom: 6px; }
  .mini { background: var(--panel-2); border: 1px solid #262626; border-radius: 10px; padding: 9px 6px 7px; text-align: center;
    cursor: pointer; transition: border-color .15s, transform .1s; }
  .mini:hover { border-color: var(--neon-dim); transform: translateY(-2px); }
  .mini .ph { width: 52px; height: 52px; border-radius: 10px; margin: 0 auto 6px; overflow: hidden; background: #000;
    display: grid; place-items: center; border: 2px solid #333; }
  .mini .ph img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .mini .ph .mono { font-weight: 800; color: var(--neon); font-size: 20px; }
  .mini.acc-w .ph { border-color: var(--purple); }
  .mini.acc-lt .ph { border-color: var(--blue); }
  .mini.acc-intl .ph { border-color: var(--orange); }
  .mini.acc-dual .ph { border-color: var(--sun); }
  .mini.staffc .ph { border-radius: 50%; }
  .mini .nm { font-size: 11px; color: var(--soft); line-height: 1.3; word-break: break-all; }
  .mini .st2 { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .mini .st2.pub { color: var(--neon); }
  .coll-empty { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  /* 開場 */
  .name-input { width: 100%; margin-top: 14px; background: var(--panel-2); border: 1px solid #333; border-radius: 10px;
    padding: 12px 14px; color: var(--ink); font-family: var(--sans); font-size: 16px; }
  .name-input:focus { outline: none; border-color: var(--neon-dim); box-shadow: 0 0 0 3px var(--neon-faint); }
  .goal-list { margin: 14px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .goal-list li { font-size: 14px; color: var(--soft); padding: 10px 12px; background: var(--panel-2); border: 1px solid #262626; border-radius: 10px; }
  .goal-list li b { color: var(--neon); }
  .callout { margin-top: 10px; padding: 11px 14px; border-radius: 10px; background: var(--neon-faint);
    border: 1px solid var(--neon-dim); font-size: 15px; font-weight: 700; color: var(--ink); }
  .callout b { color: var(--neon); }
  .cheer { margin-top: 16px; font-size: 16px; font-weight: 800; color: var(--neon); }
  .intro-top { display: flex; justify-content: flex-end; margin-bottom: 4px; }
  .brief-cols { display: grid; grid-template-columns: 1fr; gap: 4px 22px; align-items: start; }

  /* 操作說明 */
  .help-rows { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .help-row { display: flex; gap: 12px; align-items: flex-start; background: var(--panel-2); border: 1px solid #262626;
    border-radius: 10px; padding: 11px 13px; }
  .help-row .hi { font-size: 22px; line-height: 1.2; }
  .help-row b { display: block; font-size: 14px; margin-bottom: 2px; }
  .help-row b .neon { color: var(--neon); }
  .help-row p { margin: 0; font-size: 13px; color: var(--soft); line-height: 1.55; }
  /* 手機打橫：Mission Briefing 變雙欄（右欄從「⚠️ 200 位」開始）＋整體緊湊 */
  @media (orientation: landscape) and (max-height: 560px) {
    #introStep2 { width: min(880px, 96vw); padding: 16px 22px 18px; }
    #introStep2 .eyebrow { margin-bottom: 4px; }
    .brief-cols { grid-template-columns: 1fr 1fr; }
    .brief-cols .callout:first-child { margin-top: 10px; }
    #introStep2 h3 { font-size: 19px; margin-bottom: 2px; }
    .goal-list li b { font-weight: 800; }
    .goal-list { margin-top: 10px; gap: 6px; }
    .goal-list li { padding: 7px 10px; font-size: 13px; }
    .callout { padding: 8px 12px; font-size: 13px; margin-top: 8px; }
    #introStep2 p.desc { font-size: 13px; line-height: 1.55; }
    #briefDesc { display: none; }   /* 機制長說明收起：公布議程視窗內會再教 */
    .cheer { margin-top: 12px; font-size: 14px; }
    #introStep2 .btn-row { margin-top: 12px; }
    #introArt { display: none; }   /* 橫式矮螢幕收起開場圖，留空間給輸入框 */
    #helpModal { width: min(880px, 96vw); padding: 16px 22px 18px; }
    #helpModal h3 { font-size: 19px; }
    .help-rows { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .help-row { padding: 8px 11px; }
    .help-row .hi { font-size: 18px; }
    .help-row b { font-size: 13px; }
    .help-row p { font-size: 12px; }
    #helpModal .btn-row { margin-top: 12px; }
  }

  /* 首頁（滿版獨立頁） */
  #titleOverlay { background: #000; padding: 0; }
  #titleOverlay.show { display: block; }
  .title-page { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden;
    display: flex; align-items: center; justify-content: center; }
  .t-bg { position: absolute; inset: 0; }
  .t-bg svg, .t-bg img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .t-dim { position: absolute; inset: 0; background: rgba(0,0,0,.62); }
  .t-content { position: relative; text-align: center; width: min(420px, 88vw); animation: pop .4s cubic-bezier(.2,1.2,.4,1); }
  .t-logo { font-size: 14px; font-weight: 700; letter-spacing: 0.26em; text-transform: uppercase; color: var(--soft); margin-bottom: 16px; }
  .t-logo .yr { color: var(--neon); }
  .t-content h3 { margin: 0; font-size: clamp(30px, 6vw, 50px); font-weight: 800; line-height: 1.22; letter-spacing: -0.01em; }
  .t-content h3 .neon { color: var(--neon); text-shadow: 0 0 34px var(--neon-dim); }
  .t-sub { font-size: 14px; color: var(--soft); margin-top: 10px; letter-spacing: 0.06em; }
  .t-menu, .t-diff { display: flex; flex-direction: column; gap: 10px; margin-top: 30px; }
  .t-menu .btn, .t-diff .btn { width: 100%; flex: none; }
  .t-menu .btn.ghost, .t-diff .btn.ghost { background: rgba(10,10,10,.6); }
  .diff-opt { text-align: left; line-height: 1.5; }
  .diff-opt small { display: block; font-weight: 400; font-size: 12px; color: var(--muted); }
  .diff-opt.sel { border-color: var(--neon); color: var(--neon); }
  .diff-opt.sel small { color: var(--soft); }

  /* 日誌 */
  .log { max-height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .log p { margin: 0; font-size: 13px; color: var(--soft); line-height: 1.5; }
  .log p .wkb { color: var(--muted); font-size: 11px; margin-right: 6px; font-variant-numeric: tabular-nums; }
  .log p.good { color: var(--neon); }
  .log p.bad { color: var(--red); }

  /* ── 結算成就徽章 ── */
  .fin-ach { display: flex; align-items: center; margin: 4px 0; padding: 6px 10px; border-radius: 8px;
    background: rgba(255,216,77,.12); border: 1px solid rgba(255,216,77,.5);
    color: var(--sun); font-size: 12.5px; font-weight: 800; text-align: left; line-height: 1.5; }

  /* ── gacha 卡（移植自講者抽抽樂，邊框光暈依標籤色系） ── */
  #cardOverlay { background: rgba(0,0,0,.78); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  /* 左圖右文寬卡（比照 iOS 版）：左欄直式頭像、右欄資訊＋按鈕 */
  .speaker-card { position: relative; width: min(700px, 92vw); max-height: min(88vh, 720px); min-height: 340px;
    display: grid; grid-template-columns: min(280px, 42%) 1fr; grid-template-rows: 1fr auto; overflow: hidden;
    background: linear-gradient(165deg, #1A1A1A 0%, #0a0a0a 55%, #131a02 100%);
    border: 1.5px solid var(--neon); border-radius: 22px;
    box-shadow: 0 0 60px rgba(215,255,0,.25), 0 24px 70px rgba(0,0,0,.7);
    transform: perspective(1200px) rotateY(90deg) scale(.9); }
  #cardOverlay.show .speaker-card { animation: card-flip .65s cubic-bezier(.2, 1.25, .4, 1) forwards; }
  @keyframes card-flip {
    0%   { transform: perspective(1200px) rotateY(90deg) scale(.9); }
    60%  { transform: perspective(1200px) rotateY(-8deg) scale(1.02); }
    100% { transform: perspective(1200px) rotateY(0deg) scale(1); }
  }
  .speaker-card::after { content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,.14) 46%, rgba(215,255,0,.18) 50%, transparent 66%);
    transform: translateX(-120%); }
  #cardOverlay.show .speaker-card::after { animation: card-shine 1.1s ease .55s 1; }
  @keyframes card-shine { to { transform: translateX(120%); } }
  .speaker-card.acc-w   { border-color: var(--purple); box-shadow: 0 0 60px rgba(192,132,252,.3), 0 24px 70px rgba(0,0,0,.7); background: linear-gradient(165deg, #1A1A1A 0%, #0a0a0a 55%, #150a1f 100%); }
  .speaker-card.acc-lt  { border-color: var(--blue); box-shadow: 0 0 60px rgba(125,211,252,.28), 0 24px 70px rgba(0,0,0,.7); background: linear-gradient(165deg, #1A1A1A 0%, #0a0a0a 55%, #08141f 100%); }
  .speaker-card.acc-intl{ border-color: var(--orange); box-shadow: 0 0 60px rgba(255,158,69,.28), 0 24px 70px rgba(0,0,0,.7); background: linear-gradient(165deg, #1A1A1A 0%, #0a0a0a 55%, #1f1204 100%); }
  .speaker-card.acc-dual{ border-color: var(--sun); box-shadow: 0 0 60px rgba(255,216,77,.3), 0 24px 70px rgba(0,0,0,.7); background: linear-gradient(165deg, #1A1A1A 0%, #0a0a0a 55%, #1f1a04 100%); }
  /* ── 🌈 本人卡（抽到自己）：七彩虹光邊框＋持續流動＋彩虹光掃 ── */
  .speaker-card.diamond {
    border: 1.8px solid transparent;
    background:
      linear-gradient(165deg, #1a1226 0%, #0a0a12 52%, #1a1020 100%) padding-box,
      linear-gradient(120deg, #ff5d8f, #ff9e45, #ffe14d, #5dffa0, #45d0ff, #b45dff, #ff5d8f) border-box;

:"images/speakers/speaker_Shengyou.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_Shengyou.JPG"},{"name":"qcl","name_en":"qcl","rarity":"R","types":["regular"],"cats":["ai","arch"],"intl":false,"title":"Software Engineer @ Google","title_en":"Software Engineer @ Google","intro":"曾效力於台灣 Yahoo、荷蘭 Booking.com、LINE Taiwan Limited，現任職於 Google Taiwan Enginnering Limited 的 iOS 工程師。不知不覺從產品功能開發、使用者介面實作一路到基礎建設及架構設計累積了 10 年經驗，負責的產品使用者規模越來越龐大。除了寫程式之外也很喜歡城市模擬類的遊戲，有破千小時的 Cities: Skylines 遊玩時數，比起遊戲，近年更在育兒領域投入了破萬的時數。","intro_en":"Previously worked at Yahoo Taiwan, Booking.com (Netherlands), and LINE Taiwan. Currently an iOS Engineer at Google Taiwan Engineering Limited.<br><br>Over the past decade, his experience has evolved from building product features and user interfaces to designing infrastructure and application architecture, supporting products at an ever-growing scale. Outside of software development, he’s an avid city-building simulation gamer with over a thousand hours in Cities: Skylines. These days, however, parenting has easily surpassed that with well over ten thousand hours of hands-on experience.","talk":"Xcode 沒內建我愛用的 Coding Agent？iOS 開發的 Agentic Workflow 策略","talk_en":"Beyond Xcode's Built-in Agents: Discovering iOS Agentic Workflows","sessions":[{"day":"Day 1","time":"14:20 – 14:40","title":"Xcode 沒內建我愛用的 Coding Agent？iOS 開發的 Agentic Workflow 策略","title_en":"Beyond Xcode's Built-in Agents: Discovering iOS Agentic Workflows"}],"photo":"images/speakers/speaker_qcl.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_qcl.png"},{"name":"Bobson","name_en":"Bobson","rarity":"R","types":["regular"],"cats":["ai","cross"],"intl":false,"title":"Twinkle AI Astronaut","title_en":"Twinkle AI Astronaut","intro":"Twinkle AI 的核心貢獻者 (Twinkle AI Astronaut)。專注於透過行動端推理、基準測試和開發者工具，將本地大型語言模型引入邊緣裝置。","intro_en":"Core contributor to Twinkle AI (Twinkle AI Astronaut). Focused on bringing on-device large language models to edge devices through mobile inference, benchmarking, and developer tooling.","talk":"Tweet AI to the Edge","talk_en":"Tweet AI to the Edge","sessions":[{"day":"Day 1","time":"14:40 - 15:00","title":"Tweet AI to the Edge","title_en":"Tweet AI to the Edge"}],"photo":"images/speakers/speaker_Bobson.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_Bobson.jpeg"},{"name":"freddi","name_en":"Yuki Aki","rarity":"R","types":["regular"],"cats":["swift","uiux"],"intl":true,"title":"iOS engineer at Yappli","title_en":"iOS engineer at Yappli","intro":"Yuki 是日本 Yappli 的 iOS 工程師，在日本常以「freddi」活動。他致力於改善大型 App 的建置系統，曾在 NSSpain、try! Swift 等國際會議分享 Swift 開發經驗，也曾貢獻 Swift Compiler、fastlane、XcodeGen 等 OSS。喜歡音樂、卡通、畫貓、手工鍵盤、家裡的貓、寶可夢卡牌與旅行。","intro_en":"Yuki is an iOS Engineer at Yappli in Japan, also known as “freddi.” He works on improving build systems for large-scale apps and enjoys sharing what he learns from Swift development. He has spoken at conferences such as NSSpain and try! Swift, and has contributed to open source projects including the Swift Compiler, fastlane, and XcodeGen. Outside of work, he loves music, cartoons like Tom and Jerry and FLCL, drawing cats, handmade keyboards, his family cats, Pokémon cards, and traveling.","talk":"Swift 程式碼為什麼能運作？ 從平台、Runtime 與編譯器理解 Swift","talk_en":"Why Does Our Swift Code Work? Understanding Swift Through Platforms, Runtime, and the Compiler","sessions":[{"day":"Day 1","time":"15:10 – 15:30","title":"Swift 程式碼為什麼能運作？ 從平台、Runtime 與編譯器理解 Swift","title_en":"Why Does Our Swift Code Work? Understanding Swift Through Platforms, Runtime, and the Compiler"}],"photo":"images/speakers/speaker_freddi.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_freddi.jpg"},{"name":"Dex","name_en":"Dex","rarity":"R","types":["regular"],"cats":["arch","swift"],"intl":false,"title":"iOS Dev","title_en":"iOS Dev","intro":"旅日iOS Dev，任職於LINE Digital Frontier株式会社。 <br>曾經的RxSwift建築工，不幹了，無痛轉職RxSwift拆屋工。","intro_en":"Taiwanese iOS developer based in Japan, currently working at LINE Digital Frontier Corporation.<br><br>Formerly an RxSwift architect—now happily specializing in tearing RxSwift code apart and migrating it to Swift Concurrency, one project at a time.","talk":"是時候了！將RxSwift 程式碼全部改寫成 Swift Concurrency吧！","talk_en":"It's Time! Let's Rewrite All Your RxSwift Code in Swift Concurrency!","sessions":[{"day":"Day 1","time":"15:30 – 15:50","title":"是時候了！將RxSwift 程式碼全部改寫成 Swift Concurrency吧！","title_en":"It's Time! Let's Rewrite All Your RxSwift Code in Swift Concurrency!"}],"photo":"images/speakers/speaker_dex.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_dex.jpeg"},{"name":"星野恵瑠","name_en":"lovee","rarity":"SR","types":["regular"],"cats":["arch","swift","uiux"],"intl":false,"title":"Co-Author of Introduction to iOS Apps Design Patterns","title_en":"Co-Author of Introduction to iOS Apps Design Patterns","intro":"現居日本的 iOS 工程師。工程師資歷與 Swift 的年齡相同，自 Beta 1 起一路追隨至今。Swift 信者，基於個人信仰拒絕撰寫任何 Swift 以外的程式語言。<br><br>《iOS Apps 設計模式入門》共同作者之一。不過在撰寫這本書時，蘋果還沒發表 SwiftUI。","intro_en":"An iOS engineer currently based in Japan. My software engineering career is exactly as old as Swift itself, and I have been following it since the very first beta.<br><br>A proud Swift zealot who refuses to write any programming language other than Swift, purely out of personal belief.<br><br>Co-author of Introduction to iOS App Design Patterns. Back then, SwiftUI did not even exist yet.","talk":"為什麼你並不需要ViewModel","talk_en":"You don't need a ViewModel","sessions":[{"day":"Day 1","time":"16:00 – 16:40","title":"為什麼你並不需要ViewModel","title_en":"You don't need a ViewModel"}],"photo":"images/speakers/speaker_星野恵瑠.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_%E6%98%9F%E9%87%8E%E6%81%B5%E7%91%A0.png"},{"name":"Alex Hu","name_en":"Alex Hu","rarity":"R","types":["regular"],"cats":["ai","arch","product"],"intl":false,"title":"資深 iOS 開發者 ｜ 曾任新加坡航空","title_en":"Senior iOS Engineer | Formerly at Singapore Airlines","intro":"Alex Hu（胡仁恩），iOS 開發者，逾三年行動開發經驗，曾任新加坡航空資深 iOS 工程師，參與 SingaporeAir app 開發，以 MVVMC 重整架構、將支付功能抽成獨立框架，並把單元測試覆蓋率從 60% 提升到 85%；也在加密貨幣交易所與 O'Pay 等支付產品累積實戰經驗。台大生命科學系畢業，主修生物統計與健康營養，讓我在處理營養素的參考值與安全上限時，對「數據不能亂算」特別敏感。最近半年，我用 AI agent 從零開發了一款自己每天在用的營養追蹤 app，並把過去在生產級專案養成的工程紀律（ADR、模組契約、測試先行、範圍控管）拿來「帶」這位 AI 資淺工程師。","intro_en":"Alex Hu is an iOS developer with 3+ years of experience across international and fintech products. As a Senior iOS Developer at Singapore Airlines, he helped build the SingaporeAir app with an MVVMC architecture, extracted payment features into a standalone framework, and raised unit test coverage from 60% to 85%. He has also shipped payment products at a crypto exchange and at O'Pay. A Life Science degree from National Taiwan University, focused on biostatistics and health & nutrition, makes him particularly careful about how reference values and safety limits should—and shouldn't—be computed. Over the past six months, he built a nutrient-tracking app from scratch—and uses it daily—largely with an AI coding agent, applying the engineering discipline he developed on production teams (architecture decision records, module contracts, test-first development, and tight scope control) to manage that agent like a junior engineer.","talk":"把 AI 當資淺工程師帶:一個人用 agent 把 iOS App 做到上架的工程紀律","talk_en":"Managing AI Like a Junior Engineer: The Discipline Behind Shipping a Solo iOS App with Agents","sessions":[{"day":"Day 1","time":"16:50 – 17:10","title":"把 AI 當資淺工程師帶:一個人用 agent 把 iOS App 做到上架的工程紀律","title_en":"Managing AI Like a Junior Engineer: The Discipline Behind Shipping a Solo iOS App with Agents"}],"photo":"images/speakers/speaker_AlexHu.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_AlexHu.jpg"},{"name":"楊宥榛","name_en":"Annie Yang","rarity":"R","types":["regular"],"cats":["product"],"intl":false,"title":"No pain no gain.","title_en":"No pain no gain.","intro":"現任職於英國倫敦證券交易所上市（LSE: RWA）的全球頂尖招募集團 Robert Walters，長期專精於台灣軟體與技術人才市場。<br><br>自 2019 年入行以來，Annie 深度追蹤台灣技術市場的起伏，至今已諮詢超過上千位軟體工程師、媒合近百位工程師。在充滿變動的 AI 時代，致力於扮演市場中的橋樑，希望能順利陪伴人才和品牌一同成長、克服市場挑戰！","intro_en":"Currently with Robert Walters, a leading global recruitment firm listed on the London Stock Exchange (LSE: RWA), Annie specializes in Taiwan’s software engineering and technology talent market.<br><br>Since entering the recruitment industry in 2019, she has closely followed the evolution of Taiwan’s tech landscape, advised over a thousand software engineers, and successfully placed nearly a hundred professionals. In the rapidly evolving AI era, Annie is passionate about bridging talent and companies, helping both grow and thrive amid constant change.","talk":"iOS 工程師 2026 職場生存指南：資深外商獵頭視角","talk_en":"Navigating the iOS Job Market in 2026: A Senior Tech Recruiter’s Perspective","sessions":[{"day":"Day 1","time":"17:10 – 17:30","title":"iOS 工程師 2026 職場生存指南：資深外商獵頭視角","title_en":"Navigating the iOS Job Market in 2026: A Senior Tech Recruiter’s Perspective"}],"photo":"images/speakers/speaker_Annie.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_Annie.jpeg"},{"name":"海總理","name_en":"tzangms","rarity":"R","types":["regular"],"cats":["ai"],"intl":false,"title":"AI Alchemist","title_en":"AI Alchemist","intro":"海總理，前 StreetVoice 總經理，從工程師做到總經理並領導 20 倍成長；也是獨立音樂人，以「疊加效益」打造跨域視角。","intro_en":"Former GM of StreetVoice, where he grew from software engineer to GM and led the company through 20× growth. Also an independent musician who embraces a cross-disciplinary perspective through the philosophy of compound effects.","talk":"把自己抽出迴圈：讓程式獨自升級","talk_en":"Taking Yourself Out of the Loop: Letting Software Upgrade Itself","sessions":[{"day":"Day 1","time":"17:40 – 18:00","title":"把自己抽出迴圈：讓程式獨自升級","title_en":"Taking Yourself Out of the Loop: Letting Software Upgrade Itself"}],"photo":"images/speakers/speaker_海總理.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_%E6%B5%B7%E7%B8%BD%E7%90%86.jpg"},{"name":"Rudrank Riyam","name_en":"Rudrank Riyam","rarity":"SR","types":["regular"],"cats":["ai","arch"],"intl":true,"title":"Apple platforms developer, writer, and open-source maintainer","title_en":"Apple platforms developer, writer, and open-source maintainer","intro":"Rudrank is an Apple platforms developer, technical author, conference speaker, and open-source maintainer who has been building on Apple platforms since 2018. A WWDC 2019 Scholar, he writes books and tutorials on frameworks such as MusicKit, MLX Swift, and Foundation Models, and maintains open-source projects that include MusadoraKit and ASC CLI. He has spoken at numerous international iOS conferences and organizes the AiOS meetup in Cupertino after WWDC. His goal is to make Apple’s newest frameworks easier to understand, experiment with, and build upon.","intro_en":"Rudrank is an Apple platforms developer, technical author, conference speaker, and open-source maintainer who has been building on Apple platforms since 2018. A WWDC 2019 Scholar, he writes books and tutorials on frameworks such as MusicKit, MLX Swift, and Foundation Models, and maintains open-source projects that include MusadoraKit and ASC CLI. He has spoken at numerous international iOS conferences and organizes the AiOS meetup in Cupertino after WWDC. His goal is to make Apple’s newest frameworks easier to understand, experiment with, and build upon.","talk":"For Agents, By Agents: Building AI Tools That Maintain Themselves","talk_en":"For Agents, By Agents: Building AI Tools That Maintain Themselves","sessions":[{"day":"Day 2","time":"09:35 – 10:15","title":"For Agents, By Agents: Building AI Tools That Maintain Themselves","title_en":"For Agents, By Agents: Building AI Tools That Maintain Themselves"}],"photo":"images/speakers/speaker_rudrank.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_rudrank.JPG"},{"name":"Hana 花水木","name_en":"Hana Chang","rarity":"R","types":["regular"],"cats":["ai","product"],"intl":false,"title":"獎金獵人共同創辦人","title_en":"Co-founder of 獎金獵人 (BountyHunter)","intro":"15 年創業經驗，參與了 web 2.0 年代創業潮與 web3、DeFi 浪潮。目前專注研究 AI Agents 團隊自動化技術。","intro_en":"Hana has 15 years of startup experience, having participated in the Web 2.0 startup wave as well as the web3 and DeFi movements. She is currently focused on researching and building AI Agent team automation systems, exploring how human–AI collaboration can reshape product development, operations, and the way small teams work.","talk":"App 上架之後呢？用 AI Agent 自動化行銷、客服與產品迭代","talk_en":"What Happens After Your App Ships? Automating Marketing, Support, and Product Iteration with AI Agents","sessions":[{"day":"Day 2","time":"10:25 – 10:45","title":"App 上架之後呢？用 AI Agent 自動化行銷、客服與產品迭代","title_en":"What Happens After Your App Ships? Automating Marketing, Support, and Product Iteration with AI Agents"}],"photo":"images/speakers/speaker_hana.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_hana.png"},{"name":"Vic","name_en":"Vic","rarity":"R","types":["regular"],"cats":["uiux"],"intl":false,"title":"共同看見獨特的彼此","title_en":"Recognizing the uniqueness in one another.","intro":"Coseeing 是一個致力於推動數位無障礙的社群。我們透過開發工具，讓視障者看見更多資訊和可能；透過舉辦推廣活動，讓大眾看見障礙者面臨的實際挑戰和需求。","intro_en":"Coseeing is a community dedicated to advancing digital accessibility.<br>We build tools that help people who are blind or visually impaired access more information and discover new possibilities.<br>We also create opportunities for the public to better understand the real challenges and needs faced by people with disabilities.<br>Through diverse approaches and sustained action, we envision a world where everyone can see together—experiencing its richness and recognizing each other’s uniqueness.","talk":"當觸控失效時，你的 App 還能順利使用嗎？","talk_en":"When Touch Fails, Can Your App Still Be Used?","sessions":[{"day":"Day 2","time":"10:45 – 11:05","title":"當觸控失效時，你的 App 還能順利使用嗎？","title_en":"When Touch Fails, Can Your App Still Be Used?"}],"photo":"images/speakers/speaker_Vic.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_Vic.JPG"},{"name":"JungMin Ahn","name_en":"JungMin Ahn","rarity":"SR","types":["regular"],"cats":["arch"],"intl":true,"title":"I am an iOS developer focused on productivity, scalable architecture, and sharing practical engineering insights through talks and presentations.","title_en":"I am an iOS developer focused on productivity, scalable architecture, and sharing practical engineering insights through talks and presentations.","intro":"I am an iOS developer with a strong focus on productivity, scalable architecture, and building reliable mobile applications with Swift and modern Apple technologies. My work centers on creating maintainable systems, improving development workflows, and turning technical decisions into meaningful product value. I enjoy exploring practical ways to make teams move faster without compromising quality, especially through thoughtful architecture, automation, and better engineering practices. I also enjoy sharing what I learn through talks, presentations, and community discussions, with the goal of making complex engineering topics easier to understand and apply. As a developer, I am particularly interested in the intersection of product thinking, mobile engineering, and developer productivity, and I strive to contribute to products and teams that value both technical excellence and real user impact.","intro_en":"I am an iOS developer with a strong focus on productivity, scalable architecture, and building reliable mobile applications with Swift and modern Apple technologies. My work centers on creating maintainable systems, improving development workflows, and turning technical decisions into meaningful product value. I enjoy exploring practical ways to make teams move faster without compromising quality, especially through thoughtful architecture, automation, and better engineering practices. I also enjoy sharing what I learn through talks, presentations, and community discussions, with the goal of making complex engineering topics easier to understand and apply. As a developer, I am particularly interested in the intersection of product thinking, mobile engineering, and developer productivity, and I strive to contribute to products and teams that value both technical excellence and real user impact.","talk":"Lessons from Operating Large-Scale Modular iOS Projects with Tuist","talk_en":"Lessons from Operating Large-Scale Modular iOS Projects with Tuist","sessions":[{"day":"Day 2","time":"11:15 – 11:55","title":"Lessons from Operating Large-Scale Modular iOS Projects with Tuist","title_en":"Lessons from Operating Large-Scale Modular iOS Projects with Tuist"}],"photo":"images/speakers/speaker_JungMin.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_JungMin.jpg"},{"name":"Thiago Komeno","name_en":"Thiago Komeno","rarity":"R","types":["regular"],"cats":["product"],"intl":true,"title":"Software Developer","title_en":"Software Developer","intro":"日裔巴西人，目前在BaseMe Inc.擔任軟體開發工程師。曾獲得 Apple Swift Student Challenge 和擔任 Google Japan 學生大使。喜歡低階程式語言，和在空閒時間學習中文。","intro_en":"Software Developer at BaseMe Inc. Apple Swift Student Challenge 2026 Winner and Google Student Ambassador. Previously at MIXI Inc. A Japanese-Brazilian developer who loves low-level programming, Vim, and studies Mandarin in his free time.","talk":"How to Win the Swift Student Challenge","talk_en":"How to Win the Swift Student Challenge","sessions":[{"day":"Day 2","time":"13:00 – 13:20","title":"How to Win the Swift Student Challenge","title_en":"How to Win the Swift Student Challenge"}],"photo":"images/speakers/speaker_komeno.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_komeno.jpg"},{"name":"梯口","name_en":"ChengHao Yang","rarity":"SR","types":["regular"],"cats":["cross"],"intl":false,"title":"Site Reliability Engineer, CNCF Ambassador","title_en":"Site Reliability Engineer, CNCF Ambassador","intro":"SRE 工程師、CNCF 推廣大使、Cloud Native Taiwan User Group 共同組織者，同時是 Kubernetes 上游的貢獻者，同時也是子專案 Kubespray 的 Maintainer。<br>一個日常不寫 Swift 的雲端原生工程師，因為對容器技術的好奇，從 2025 年起意外成為 Apple Container 的貢獻者之一。","intro_en":"SRE Engineer, CNCF Ambassador, and co-organizer of the Cloud Native Taiwan User Group. He is also a contributor to upstream Kubernetes and a maintainer for the Kubespray sub-project.<br>A cloud-native engineer who doesn't typically write Swift, his curiosity about container technology led him to unexpectedly become a contributor to Apple Container starting in 2025.","talk":"不寫 Swift 也能貢獻 Apple Container：一位雲端原生工程師的開源實戰","talk_en":"Contributing to Apple Container Without Writing Swift: A Cloud Native Engineer's Open Source Journey","sessions":[{"day":"Day 2","time":"13:30 – 14:10","title":"不寫 Swift 也能貢獻 Apple Container：一位雲端原生工程師的開源實戰","title_en":"Contributing to Apple Container Without Writing Swift: A Cloud Native Engineer's Open Source Journey"}],"photo":"images/speakers/speaker_梯口.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_%E6%A2%AF%E5%8F%A3.jpg"},{"name":"Joy","name_en":"Joy","rarity":"R","types":["regular"],"cats":["ai","swift","uiux"],"intl":false,"title":"iOS Engineer","title_en":"iOS Engineer","intro":"iOS 工程師，喜歡研究新技術。希望透過交流與分享，讓更多開發者一起學習、一起成長。","intro_en":"An iOS engineer with a passion for exploring new technologies. Believes in learning through sharing and hopes to help fellow developers grow together through open exchange and collaboration.","talk":"讓 Apple Intelligence 理解你的 App","talk_en":"How Apple Intelligence Understands Your App","sessions":[{"day":"Day 2","time":"14:20 – 14:40","title":"讓 Apple Intelligence 理解你的 App","title_en":"How Apple Intelligence Understands Your App"}],"photo":"images/speakers/speaker_Joy.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_Joy.png"},{"name":"彼得潘","name_en":"Peter Pan","rarity":"R","types":["regular"],"cats":["ai","cross"],"intl":false,"title":"愛瘋一切為蘋果的彼得潘","title_en":"A Peter Pan who never outgrew a love for all things Apple.","intro":"喜歡學習和寫作，特別是 Apple、Swift iOS App、Flutter App、AI、程式設計相關主題，開心地過著一邊學習一邊分享的生活。","intro_en":"I enjoy learning and writing, especially about Apple, Swift iOS apps, Flutter apps, AI, and programming. I happily live a life of learning and sharing at the same time.","talk":"從 Vibe Coding 學會的 macOS CLI 魔法指令","talk_en":"macOS CLI Magic Commands I Learned from Vibe Coding","sessions":[{"day":"Day 2","time":"14:40 – 15:00","title":"從 Vibe Coding 學會的 macOS CLI 魔法指令","title_en":"macOS CLI Magic Commands I Learned from Vibe Coding"}],"photo":"images/speakers/speaker_PeterPan.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_PeterPan.jpg"},{"name":"Denken","name_en":"Denken","rarity":"R","types":["regular"],"cats":["cross"],"intl":false,"title":"從工程師落跑去做國際標準","title_en":"From software engineering to shaping international standards.","intro":"做了十年 iOS App 工程師及參與 g0v 社群之後，因緣際會參與數位憑證皮夾團隊及 W3C 國際標準組織，目前亦擔任 W3C Credentials 社群組共同主席。","intro_en":"After a decade of working as an iOS app developer and contributing to the g0v community, I had the opportunity to join Taiwan Digital Identity Wallet team and become involved with the W3C. I currently also serve as Co-Chair of the W3C Credentials Community Group.","talk":"年齡保證框架，兼談數位憑證皮夾","talk_en":"Age Assurance Frameworks and Digital Identity Wallet","sessions":[{"day":"Day 2","time":"15:10 – 15:30","title":"年齡保證框架，兼談數位憑證皮夾","title_en":"Age Assurance Frameworks and Digital Identity Wallet"}],"photo":"images/speakers/speaker_denken.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_denken.png"},{"name":"彭成瑋 Ervis","name_en":"Ervis Peng","rarity":"R","types":["regular"],"cats":["ai","arch"],"intl":false,"title":"Senior iOS Engineer","title_en":"Senior iOS Engineer","intro":"擁有 11 年以上 iOS 開發經驗，曾擔任 App 團隊 Lead，長期投入餐飲 POS、第三方支付、硬體整合與電商平台開發。近期獨立開發「旅收」，從日本旅行收據記帳痛點出發，整合 Apple Intelligence、雲端 OCR、協作分帳與營運後台，探索一人產品如何透過 AI 與使用者回饋持續迭代。","intro_en":"Senior iOS Engineer with 11+ years of iOS experience and App Team Lead experience, specializing in restaurant POS, payment and hardware integrations, and e-commerce platforms. Recently built 旅收, a travel receipt and expense tracking app that explores how a solo developer can use AI and user feedback to continuously iterate a real-world product.","talk":"從一張看不懂的日本收據開始：一人開發者如何用 AI 與回饋系統把 Side Project 長成產品","talk_en":"From an Unreadable Japanese Receipt: How a Solo Developer Grew a Side Project into a Product with AI and Feedback Systems","sessions":[{"day":"Day 2","time":"15:30 – 15:50","title":"從一張看不懂的日本收據開始：一人開發者如何用 AI 與回饋系統把 Side Project 長成產品","title_en":"From an Unreadable Japanese Receipt: How a Solo Developer Grew a Side Project into a Product with AI and Feedback Systems"}],"photo":"images/speakers/speaker_ErvisPeng.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_ErvisPeng.jpeg"},{"name":"高見龍","name_en":"Chien-Long, Kao","rarity":"SR","types":["regular"],"cats":["ai","arch"],"intl":false,"title":"喜歡寫程式而且希望可以寫一輩子程式的電腦阿宅！","title_en":"A proud coding geek who hopes to keep writing code for a lifetime.","intro":"網站程式開發者 / 講師 / 遊戲宅 / 漫畫宅，喜愛非主流的新玩具，著有《為你自己學 Git》、《為你自己學 Python》以及《為你自己學 Ruby on Rails》等暢銷書籍。<br><br>是個喜歡寫程式而且希望可以寫一輩子程式的電腦阿宅！","intro_en":"Web developer, instructor, gamer, and manga enthusiast with a passion for exploring unconventional technologies and tools. Author of the bestselling books 為你自己學 Git, 為你自己學 Python, and 為你自己學 Ruby on Rails.<br><br>A proud coding geek who hopes to keep writing code for a lifetime.","talk":"SDD 是口號，還是真的可以用？","talk_en":"Is SDD Just a Slogan, or Can It Actually Work?","sessions":[{"day":"Day 2","time":"16:00 – 16:40","title":"SDD 是口號，還是真的可以用？","title_en":"Is SDD Just a Slogan, or Can It Actually Work?"}],"photo":"images/speakers/speaker_kaochenlong.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_kaochenlong.jpg"},{"name":"Yu Takahashi","name_en":"Yu Takahashi","rarity":"N","types":["lightning"],"cats":["swift"],"intl":false,"title":"Japanese Software Engineer","title_en":"Japanese Software Engineer","intro":"在 STORES 擔任軟體工程師，橫跨 Next.js、Ruby on Rails 與 iOS 開發。自 SwiftUI 發布以來開始接觸 Swift。","intro_en":"Software engineer at STORES, working across Next.js, Ruby on Rails, and iOS. Started learning Swift when SwiftUI launched.","talk":"為什麼 Swift Macro 無法在 #Preview 中使用？","talk_en":"Why Can't We Have Nice Macros for `#Preview`?","sessions":[{"day":"Day 2","time":"16:50 – 16:55","title":"為什麼 Swift Macro 無法在 #Preview 中使用？","title_en":"Why Can't We Have Nice Macros for `#Preview`?"}],"photo":"images/speakers/speaker_Takahashi.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_Takahashi.jpg"},{"name":"劉信","name_en":"Paul","rarity":"N","types":["lightning"],"cats":["product","uiux"],"intl":false,"title":"Independent iOS Developer & Learning Engineer","title_en":"Independent iOS Developer & Learning Engineer","intro":"劉信是一個獨立的 Apple 平台開發者，擁有十年的軟體開發經驗，也是開發者社群的活躍參與者。他熱衷於 Swift 語言，及自由研究與創作。身為一個「學習工程師」，他畢生不斷思考學習的本質與方法，及如何將科學思維應用於學習相關產品與體驗。","intro_en":"Paul is an independent developer focused on Apple platforms, with a decade of experience in software development and an active role in the developer community. He’s passionate about the Swift programming language and pursuing independent research and creative projects. Since his student days, Paul has been deeply interested in how people learn. Self-identified as a “Learning Engineer,” he's actively exploring how scientific thinking can be applied to improve learning products and experiences.","talk":"坑很深：做寫字練習 App 比想像更費工","talk_en":"Down the Rabbit Hole: A Handwriting App's Scope Creep","sessions":[{"day":"Day 2","time":"16:55 – 17:00","title":"坑很深：做寫字練習 App 比想像更費工","title_en":"Down the Rabbit Hole: A Handwriting App's Scope Creep"}],"photo":"images/speakers/speaker_劉信.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_%E5%8A%89%E4%BF%A1.jpg"},{"name":"Jess","name_en":"Jess","rarity":"N","types":["lightning"],"cats":["ai","product"],"intl":false,"title":"Product Builder","title_en":"Product Builder","intro":"即將就讀康乃爾大學設計科技碩士，熱衷於 AI 產品、Apple Vision Pro，喜歡從 0到1 打造產品","intro_en":"Incoming Cornell Design Technology graduate student. Passionate about AI products, Apple Vision Pro, and building products from 0 to 1.","talk":"當 Vibe Coding 不再是最大的問題，Nibble 的產品探索旅程","talk_en":"Building Nibble: Product Discovery in the Era of AI","sessions":[{"day":"Day 2","time":"17:00 – 17:05","title":"當 Vibe Coding 不再是最大的問題，Nibble 的產品探索旅程","title_en":"Building Nibble: Product Discovery in the Era of AI"}],"photo":"images/speakers/speaker_jess.jpg","photo_hd":"https://raw.githubusercontent.com/iplayground/SessionData/2026/v1/images/speakers/speaker_jess.jpg"},{"name":"Ethan","name_en":"Ethan","rarity":"N","types":["lightning"],"cats":["ai","product"],"intl":false,"title":"Wink CTO","title_en":"Wink CTO","intro":"Wink GM/CTO.","intro_en":"Wink GM/CTO.","talk":"開發 AI Dating Agent 的血淚史：那些好笑、奇怪又令人害怕的教訓","talk_en":"Funny, Weird, and Terrifying Lessons from Building a Dating AI Agent","sessions":[{"day":"Day 2","time":"17:05 – 17:10","title":"開發 AI Dating Agent 的血淚史：那些好笑、奇怪又令人害怕的教訓","title_en":"Funny, Weird, and Terrifying Lessons /* ═══════════ 工具 ═══════════ */
const $ = id => document.getElementById(id);
function d6() { return 1 + Math.floor(Math.random() * 6); }
function dice(n) { const r = []; for (let i = 0; i < n; i++) r.push(d6()); return r; }
function sum(a) { return a.reduce((x, y) => x + y, 0); }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function clampReg() { S.reg = Math.max(0, S.reg); }   /* 上限開放：REG_CAP 只是滿員成就門檻 */
function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
const wait = ms => new Promise(r => setTimeout(r, reducedMotion ? 0 : ms));

/* 本人卡：玩家名字對到講者/工作人員時的彩蛋加成 */
const SELF_LUCK = 5; // 抽卡時本人卡的權重（其他卡為 1）
/* 拆名字為 token（空格／中點分隔，≥2 字才算，避免單字誤中） */
function nameTokens(s) {
  return String(s || '').toLowerCase().split(/[\s·・.,]+/).filter(t => t.length >= 2);
}
/* 玩家名字只要對到卡片名字的任一 token 即算本人（如「Rudrank」對到「Rudrank Riyam」） */
function isSelfName(name) {
  if (!playerName) return false;
  const pt = nameTokens(playerName), nt = nameTokens(name);
  if (!pt.length || !nt.length) return false;
  if (pt.join(' ') === nt.join(' ')) return true;
  return pt.some(t => nt.includes(t));
}
function isSelfSpeaker(c) { return isSelfName(c.name) || isSelfName(c.name_en); }
function selfStaffRecruited() { return S.staff.some(i => isSelfName(STAFF_CARDS[i].name)); }
function pickCard(pool, isSelf) {
  const w = pool.map(i => (isSelf(i) ? SELF_LUCK : 1));
  let t = Math.random() * w.reduce((a, b) => a + b, 0);
  for (let k = 0; k < pool.length; k++) { t -= w[k]; if (t < 0) return pool[k]; }
  return pool[pool.length - 1];
}

function log(msg, cls) {
  const p = document.createElement('p');

  const el = $('log');

  while (el.children.length > 60) el.lastChild.remove();
}

/* ═══════════ 議程效應（公布後每週持續發酵） ═══════════ */
function d3() { return 1 + Math.floor(Math.random() * 3); }
const WEEKLY_BASE = { R: 2, W: 1, N: 0 };
const WEEKLY_RANGE = { R: '3~5', W: '2~4', N: '1~3' };
const WEEKLY_AVG = { R: 4, W: 3, N: 2 };
function weeklyRoll(card) { return WEEKLY_BASE[typeKey(card)] + d3(); }
function announceHint(card) {
  return L(`公布議程後：每週 +${WEEKLY_RANGE[typeKey(card)]} 報名，持續發酵到活動日`,
           `Once announced: +${WEEKLY_RANGE[typeKey(card)]} signups every week until showtime`);
}
function lineupMult() {
  const n = S.roster.filter(r => r.announced).length;
  let m = Math.min(1.3, 1 + 0.04 * Math.max(0, n - 1));
  if (S.covBonusGiven) m *= 1.2;
  return m;
}
function estimateWeekly() {
  const ann = S.roster.filter(r => r.announced);
  if (!ann.length) return 0;
  return Math.round(ann.reduce((s, r) => { const c = SPEAKER_CARDS[r.idx]; return s + WEEKLY_AVG[typeKey(c)] * (isSelfSpeaker(c) ? 2 : 1); }, 0) * lineupMult());
}
function agendaTick(label) {
  const ann = S.roster.filter(r => r.announced);
  if (!ann.length) return 0;
  const m = lineupMult();
  let raw = 0;
  ann.forEach(r => { const c = SPEAKER_CARDS[r.idx]; let v = weeklyRoll(c); if (isSelfSpeaker(c)) v *= 2; raw += v; r.contrib += v; });
  const gain = Math.round(raw * m);
  S.reg += gain; clampReg();
  log(L(`📈 ${label}：${ann.length} 位已公布講者持續發酵，報名 +${gain}（陣容乘數 ×${m.toFixed(2)}）`,
        `📈 ${label}: ${ann.length} announced speaker(s) keep working — +${gain} signups (lineup ×${m.toFixed(2)})`), 'good');
  return gain;
}

  let confetti = '';
  for (let i = 0; i < 22; i++) confetti += `<rect x="${(i * 61) % 450}" y="${(i * 37) % 130}" width="6" height="3" rx="1" fill="${['#D7FF00', '#F0997B', '#85B7EB', '#F4C0D1'][i % 4]}" transform="rotate(${i * 33} ${(i * 61) % 450} ${(i * 37) % 130})"/>`;
  return `<svg viewBox="0 0 460 240" xmlns="http://www.w3.org/2000/svg"><rect width="460" height="240" fill="#8FC1EA"/>

    ${crowdFigs(Math.min(20, Math.floor(S.reg / 18)), 164)}

}
let currentEventArt = null;   // 事件敘事期間覆蓋場景的事件圖 id
let sceneOverride = null;     // 直接注入 sceneArt 的原始 HTML（神秘講者剪影/點亮用）
function renderScene() {
  if (sceneOverride) {
    $('sceneArt').innerHTML = sceneOverride;
    return;
  }
  if (currentEventArt && EVENT_IMAGES[currentEventArt]) {
    $('sceneArt').innerHTML = `<img src="${EVENT_IMAGES[currentEventArt]}" alt="">`;
    return;
  }
  const phase = scenePhase();
  const img = SCENE_IMAGES[phase];
  $('sceneArt').innerHTML = img ? `<img src="${img}" alt="">` : sceneSVG(phase);
}
/* 首頁滿版背景：title key art → 前夜場景圖 → 內建 SVG */
function renderTitleBg() {
  const img = SCENE_IMAGES.title || SCENE_IMAGES.eve;
  if (img) {
    $('tBg').innerHTML = `<img src="${img}" alt="">`;
  } else {
    $('tBg').innerHTML = sceneSVG('eve').replace('<svg ', '<svg preserveAspectRatio="xMidYMid slice" ');
  }
}

/* ═══════════ 訊息窗（打字機） ═══════════ */
let msgBusy = false, typing = false, awaitingAck = false, ackShown = 0;
let curFinish = null, ackResolve = null, typeTimer = null;

function say(text, opts = {}) {
  return new Promise(resolve => {
    msgBusy = true;
    $('msgTag').textContent = opts.tag || '';
    $('msgChoices').innerHTML = '';
    $('msgAdv').style.display = 'none';
    const el = $('msgText');
    el.textContent = '';
    typing = true;
    let i = 0;
    clearInterval(typeTimer);
    const speed = reducedMotion ? 0 : 20;
    curFinish = finish;
    if (speed === 0) { finish(); } else {
      typeTimer = setInterval(() => {
        if (i >= text.length) { finish(); return; }
        el.textContent += text[i++];
      }, speed);
    }
    function finish() {
      clearInterval(typeTimer);
      typing = false;
      el.textContent = text;
      if (opts.choices && opts.choices.length) {
        opts.choices.forEach(ch => {
          const b = document.createElement('button');
          b.className = 'msg-btn' + (ch.ghost ? ' ghost' : '');
          b.textContent = ch.label;
          b.onclick = e => {
            e.stopPropagation();
            $('msgChoices').innerHTML = '';
            msgBusy = false;
            if (ch.run) ch.run();
            resolve();
            renderScene(); render();
          };
          $('msgChoices').appendChild(b);
        });
      } else if (opts.wait === false) {
        msgBusy = false; resolve(); render();
      } else {
        // 前幾次帶「點擊繼續」教學字樣，之後只留 ▼
        $('msgAdv').textContent = ackShown < 3 ? L('👆 點訊息欄繼續 ▼', '👆 tap message box ▼') : '▼';
        $('msgAdv').style.display = '';
        awaitingAck = true;
        ackResolve = () => {
          awaitingAck = false; ackShown++;
          $('msgAdv').style.display = 'none';
          msgBusy = false; resolve(); render();
        };
      }
    }
  });
}
$('msgwin').addEventListener('click', () => {
  if (typing && curFinish) { curFinish(); }
  else if (awaitingAck && ackResolve) { ackResolve(); }
});

function setForced(type, reason) {
  S.forcedType = type; S.forcedReason = reason;
  log(L(`🎯 ${reason}：下一抽鎖定「${typeL(type)}」`, `🎯 ${reason}: next draw locked to "${typeL(type)}"`), 'good');

function eventPhase() { return S.week <= 3 ? 'early' : S.week <= 6 ? 'mid' : 'late'; }

/* 難度：加權事件機率（低=好事多壞事少、高=反之） */
let difficulty = localStorage.getItem('ipg_diff') || 'normal';
const EVENT_KIND = {
  sponsor: 'good', self_submit: 'good', boost_share: 'good', earlybird: 'good',
  viral: 'good', volunteer: 'good', bento: 'good', designate: 'good',
  quiet: 'neutral', drama: 'neutral',
  cfp_cold: 'bad', rival: 'bad', ticket_down: 'bad', flu: 'bad',
  typhoon: 'bad', refund: 'bad', cancel: 'bad',
};
/* 事件 kind：新事件（主/輕）自帶 ev.kind；舊主事件沿用 EVENT_KIND 表 */
function eventKind(ev) { return ev.kind || EVENT_KIND[ev.id] || 'neutral'; }
/* phase 可為 'any' / 單一字串 / 陣列（多階段），對照當前 eventPhase() */
function eventPhaseMatch(evPhase, cur) {
  if (evPhase === 'any') return true;
  if (Array.isArray(evPhase)) return evPhase.includes(cur);
  return evPhase === cur;
}
function eventWeight(ev) {
  const kind = eventKind(ev);
  if (difficulty === 'easy') return kind === 'good' ? 2 : kind === 'bad' ? 0.5 : 1;
  if (difficulty === 'hard') return kind === 'good' ? 0.5 : kind === 'bad' ? 2 : 1;
  return 1;
}
function diffName() { return { easy: L('低', 'Easy'), normal: L('中', 'Normal'), hard: L('高', 'Hard') }[difficulty]; }

function pickEvent() {
  const cur = eventPhase();
  const pool = EVENTS.filter(e =>
    eventPhaseMatch(e.phase, cur) && e.id !== S.lastEventId && (!e.cond || e.cond()));
  const total = pool.reduce((s, e) => s + eventWeight(e), 0);
  let roll = Math.random() * total;
  for (const e of pool) {
    roll -= eventWeight(e);
    if (roll <= 0) return e;
  }
  return pool[pool.length - 1];
}
/* 輕事件挑選：分池、獨立去重（lastLightEventId ＋ 同局不重複 usedLightIds） */
function pickLightEvent() {
  const cur = eventPhase();
  const pool = LIGHT_EVENTS.filter(e =>
    eventPhaseMatch(e.phase, cur) && e.id !== S.lastLightEventId &&
    !S.usedLightIds.includes(e.id) && (!e.cond || e.cond()));
  if (!pool.length) return null;
  const total = pool.reduce((s, e) => s + eventWeight(e), 0);
  let roll = Math.random() * total;
  for (const e of pool) {
    roll -= eventWeight(e);
    if (roll <= 0) return e;
  }
  return pool[pool.length - 1];
}
async function runLightEventNarrative(le) {
  S.lastLightEventId = le.id;
  S.usedLightIds.push(le.id);
  sceneOverride = null; currentEventArt = null;   // 輕事件無圖：維持季節場景
  renderScene();
  await say(le.text[lang] || le.text.zh, { tag: L(`第 ${S.week} 週 · 快訊`, `Week ${S.week} · Flash`) });
  if (le.apply) le.apply();
  renderScene(); render();
}

/* 講者取消（純文字版，走訊息窗） */
function runCancelEventPlain() {
  const ri = Math.floor(Math.random() * S.roster.length);
  const victim = S.roster[ri];
  const vCard = SPEAKER_CARDS[victim.idx];
  const vType = vCard.types.includes('workshop') ? 'workshop' : vCard.types.includes('lightning') ? 'lightning' : 'regular';
  const backup = S.roster.find(r => r !== victim && !r.announced && SPEAKER_CARDS[r.idx].types.includes(vType));

  S.roster.splice(ri, 1);
  let msg = L(`講者「${nm(vCard)}」臨時有要事，無法出席……`, `Speaker "${nm(vCard)}" can no longer make it...`);
  let refund = 0;
  if (victim.announced) { const d = dice(2); refund = sum(d); S.reg -= refund; clampReg(); }

  if (backup) {
    const bName = nm(SPEAKER_CARDS[backup.idx]);
    if (victim.announced) {
      backup.announced = true;
      msg += L(`失望退票 −${refund}。好在「${bName}」臨危受命救場，緊急公布遞補，議程效應不中斷！`,
               ` Refunds: −${refund}. But "${bName}" steps up as the emergency replacement — the agenda effect continues!`);
      log(L(`😱 ${esc(nm(vCard))} 取消（退票 −${refund}）→ ${esc(bName)} 備援救場`, `😱 ${esc(nm(vCard))} cancelled (−${refund}) → ${esc(bName)} saves the day`), 'good');
    } else {
      msg += L(`好在還有「${bName}」可以補位，議程沒有開天窗。`, ` Luckily "${bName}" can fill the slot — no gap in the program.`);
      log(L(`😱 ${esc(nm(vCard))} 取消，${esc(bName)} 補位`, `😱 ${esc(nm(vCard))} cancelled, ${esc(bName)} fills in`), 'bad');
    }
  } else {
    msg += victim.announced
      ? L(`沒有備援講者……失望退票 −${refund}，之後也少了他的每週發酵。`, ` No backup speaker... −${refund} refunds, and their weekly buzz is gone too.`)
      : L('沒有備援講者，只能默默把議程表改掉。', ' No backup available — quietly edit the schedule and move on.');
    log(L(`😱 講者取消：失去 ${esc(nm(vCard))}${victim.announced ? `（退票 −${refund}）` : ''}`,
          `😱 Cancellation: lost ${esc(nm(vCard))}${victim.announced ? ` (−${refund} refunds)` : ''}`), 'bad');
  }
  return msg;
}

/* ── 神秘講者來訪：剪影 → 四選一 → 答對免費入手／答錯公布正解 ── */
function buildQuizNameOptions(targetIdx) {
  const target = SPEAKER_CARDS[targetIdx];
  const others = SPEAKER_CARDS.map((_, i) => i).filter(i => i !== targetIdx);
  const sameTag = others.filter(i => SPEAKER_CARDS[i].cats.some(k => target.cats.includes(k)));
  const sameIntl = others.filter(i => SPEAKER_CARDS[i].intl === target.intl);
  const distractors = [];
  const pushFrom = arr => shuffle(arr).forEach(i => { if (distractors.length < 3 && !distractors.includes(i)) distractors.push(i); });
  pushFrom(sameTag); pushFrom(sameIntl); pushFrom(others);   // 同 tag → 同 intl → 全池
  return shuffle([targetIdx, ...distractors.slice(0, 3)]);
}
async function runQuizVisitEvent(ev, tag, name) {
  sceneOverride = null; currentEventArt = null; renderScene();
  await say(`${ev.icon} ${name}——${ev.desc[lang] || ev.desc.zh}`, { tag });

  const targetIdx = pickCard(S.speakerPool, i => isSelfSpeaker(SPEAKER_CARDS[i]));
  const target = SPEAKER_CARDS[targetIdx];
  const options = buildQuizNameOptions(targetIdx);

  // 場景切成全黑剪影
  sceneOverride = `<img class="scene-sil" src="${esc(target.photo || '')}" alt="">`;
  renderScene();

  let chosen = null;
  await say(L('👤 這位神秘講者是誰？猜對他就答應站台！', '👤 Who is this mystery speaker? Guess right and they join!'), {
    tag,
    choices: options.map(idx => ({ label: nm(SPEAKER_CARDS[idx]), run() { chosen = idx; } })),
  });

  // 剪影 0.4s 過渡點亮
  msgBusy = true; render();
  sceneOverride = `<img class="scene-reveal" src="${esc(target.photo || '')}" alt="">`;
  renderScene();
  await wait(650);
  const correct = chosen === targetIdx;
  if (correct) {
    S.speakerPool = S.speakerPool.filter(i => i !== targetIdx);
    S.roster.push({ idx: targetIdx, announced: false, contrib: 0 });
    log(L(`🎭 神秘講者 <b>${esc(nm(target))}</b> 加入陣容！（免費、不佔上限）`,
          `🎭 Mystery speaker <b>${esc(nm(target))}</b> joins the lineup! (free, no limit)`), 'good');
    if (isSelfSpeaker(target)) log(L('🪞 而且竟然就是總召本人！公布後每週報名 ×2', '🪞 ...and it turns out to be the Chief! ×2 weekly signups once announced'), 'good');
    await say(L(`🎉 答對了！${nm(target)} 二話不說加入你的陣容——免費、不佔本週上限！`,
                `🎉 Correct! ${nm(target)} joins on the spot — free, and it doesn't use your weekly limit!`), { tag });
    sceneOverride = null; currentEventArt = null; renderScene(); render();
    showSpeakerCard(target);
  } else {
    await say(L(`🙈 他笑著搖搖頭離開了——原來是 ${nm(target)}。（沒有懲罰，但可以認識一下他）`,
                `🙈 They smile, shake their head, and leave — it was ${nm(target)}. (No penalty — but get to know them.)`), { tag });
    sceneOverride = null; currentEventArt = null; renderScene(); render();
    showSpeakerCard(target, null, true);   // 卡冊檢視模式：讓玩家看到正解卡面
  }
}

async function startWeek() {
  S.ap = weeklyApBase();
  S.drawsThisWeek = 0;
  S.speakerDrawLimit = 3;
  S.promoHalved = S.promoHalvedNextWeek;
  S.promoHalvedNextWeek = false;

  const gain = agendaTick(L(`第 ${S.week} 週議程效應`, `Week ${S.week} agenda effect`));

  if (S.week >= 7 && !S.forcedType) {
    if (countType('workshop') === 0 && S.speakerPool.some(i => SPEAKER_CARDS[i].types.includes('workshop'))) {
      setForced('workshop', L('議程組緊急協調', 'Program team scramble'));
    } else if (countType('lightning') === 0 && S.speakerPool.some(i => SPEAKER_CARDS[i].types.includes('lightning'))) {
      setForced('lightning', L('議程組緊急協調', 'Program team scramble'));
    }
  }

  renderScene(); render();
  let flavor = WEEK_FLAVOR[S.week - 1][lang] || WEEK_FLAVOR[S.week - 1].zh;
  if (gain > 0) flavor += L(`（議程效應：報名 +${gain}！）`, ` (Agenda effect: +${gain} signups!)`);
  await say(flavor, { tag: L(`第 ${S.week} 週`, `Week ${S.week}`) });
  if (S.week >= 2) {
    await runEventNarrative(pickEvent());
    if (Math.random() < 0.5) {                    // 主事件結束後 50% 追加一則輕事件快訊
      const le = pickLightEvent();

  say(L('本週要做什麼呢？', 'What should we do this week?'), { tag: L(`第 ${S.week} 週 · 待命`, `Week ${S.week} · Standing by`), wait: false });
}

function endWeek() {
  if (spinning || S.over || msgBusy) return;
  if (S.week >= TOTAL_WEEKS) { finale(); return; }
  S.week += 1;
  startWeek();
}

function canInvite() {
  return !S.over && !spinning && !msgBusy && S.speakerPool.length > 0 &&
    (S.freeDraws > 0 || (S.ap >= 1 && S.drawsThisWeek < S.speakerDrawLimit));
}
function actInvite() {
  if (!canInvite()) return;
  const usedFree = S.freeDraws > 0;
  if (usedFree) S.freeDraws -= 1; else { S.ap -= 1; S.drawsThisWeek += 1; }

  let candidates = S.speakerPool;
  if (S.forcedType) {
    const sub = S.speakerPool.filter(i => SPEAKER_CARDS[i].types.includes(S.forcedType));
    if (sub.length) candidates = sub;
    S.forcedType = null; S.forcedReason = '';
  }
  const winnerIdx = pickCard(candidates, i => isSelfSpeaker(SPEAKER_CARDS[i]));
  spinWheel('speaker', winnerIdx, () => {
    S.speakerPool = S.speakerPool.filter(i => i !== winnerIdx);
    S.roster.push({ idx: winnerIdx, announced: false, contrib: 0 });
    const c = SPEAKER_CARDS[winnerIdx];
    log(L(`🎤 邀請成功：<b>${esc(nm(c))}</b>（${typeBadges(c)}）${usedFree ? ' · 免費' : ''}`,
          `🎤 Invited: <b>${esc(nm(c))}</b> (${typeBadges(c)})${usedFree ? ' · free' : ''}`), 'good');
    if (isSelfSpeaker(c)) {
      log(L('🪞 講者就是總召本人！號召力驚人，公布後每週報名 ×2', '🪞 The speaker IS the Chief! Star power: ×2 weekly signups once announced'), 'good');
    }
    showSpeakerCard(c);
    render();
  });
  render();
}

function canStaff() { return !S.over && !spinning && !msgBusy && S.ap >= 1 && S.staffPool.length > 0; }
function actStaff() {
  if (!canStaff()) return;
  S.ap -= 1;

    }

}

function canPromo() { return !S.over && !spinning && !msgBusy && S.ap >= 1; }
function actPromo() {
  if (!canPromo()) return;
  S.ap -= 1;
  const d = dice(2);
  const announced = S.roster.filter(r => r.announced).length;
  let gain = sum(d) + 2 * announced;
  let note = L(`2d6（${d.join('+')}）＋ 已公布講者 ${announced}×2`, `2d6 (${d.join('+')}) + announced ${announced}×2`);
  if (S.promoBoost) { gain *= 2; note += L(' · 大神轉發 ×2', ' · repost ×2'); S.promoBoost = false; }
  if (S.promoHalved) { gain = Math.floor(gain / 2); note += L(' · 撞檔減半', ' · rival halved'); }
  S.reg += gain; clampReg();
  log(L(`📣 宣傳售票：報名 +${gain}（${note}）`, `📣 Promo: +${gain} signups (${note})`), 'good');
  showPromoResult(gain, note);
  renderScene(); render();
}

function canAnnounce() { return !S.over && !spinning && !msgBusy && S.ap >= 1 && S.roster.some(r => !r.announced); }
function actAnnounce() {
  if (!canAnnounce()) return;
  S.ap -= 1;
  const batch = S.roster.filter(r => !r.announced);
  batch.forEach(r => { r.announced = true; });

  let covLine = '';
  if (!S.covBonusGiven && regularCats().size === CAT_KEYS.length) {
    S.covBonusGiven = true;
    covLine = L('🌈 主題多樣性爆棚！6 大 tag 全湊齊：議程效應永久 ×1.2', '🌈 Full topic diversity! All 6 tags covered: agenda effect ×1.2 forever');
    log(covLine, 'good');
  }

  const annCount = S.roster.filter(r => r.announced).length;
  const est = estimateWeekly();
  const remainTicks = TOTAL_WEEKS - S.week + 1;
  log(L(`📋 公布議程：${batch.length} 位講者亮相（陣容 ${annCount} 位）→ 每週約 +${est} 報名開始發酵`,
        `📋 Agenda announced: ${batch.length} speaker(s) revealed (lineup ${annCount}) → ~+${est} signups/week`), 'good');
  showAnnounceModal(batch, est, remainTicks, covLine);
  render();
}

/* 大卡照片：依序試高清 URL → 本機縮圖 → 字母縮寫 */
function fillPhoto(el, name, ...sources) {
  el.querySelectorAll('img, .monogram').forEach(x => x.remove());
  const srcs = sources.filter(Boolean);
  if (!srcs.length) return mono();
  let i = 0;
  const img = document.createElement('img');
  img.alt = name;
  img.onerror = () => { i += 1; if (i < srcs.length) img.src = srcs[i]; else { img.remove(); mono(); } };
  img.src = srcs[0];
  el.appendChild(img);
  function mono() {
    const m = document.createElement('div');
    m.className = 'monogram'; m.textContent = [...(name || '?')][0].toUpperCase();
    el.appendChild(m);
  }
}

function earnedAchievements() {
  const out = [];
  if (S.reg > REG_CAP) out.push('soldOut');
  if (STAFF_CARDS.length && S.staff.length === STAFF_CARDS.length) out.push('allStaff');
  const rosterSet = new Set(S.roster.map(r => r.idx));
  const hasAll = t => {
    const all = SPEAKER_CARDS.map((c, i) => c.types.includes(t) ? i : -1).filter(i => i >= 0);
    return all.length > 0 && all.every(i => rosterSet.has(i));
  };
  if (hasAll('workshop')) out.push('allWorkshop');
  if (hasAll('lightning')) out.push('allLightning');
  if (hasAll('regular')) out.push('allRegular');
  if (rosterSet.size === SPEAKER_CARDS.length) out.push('allSpeakers');
  return out;
}
function achievementLabel(a) {
  switch (a) {

    $('finSlogan').textContent = L('宣傳，宣傳，宣傳……', 'Promote, promote, promote...');
    localStorage.setItem('ipg_boost', '1');
  } else {
    const covPts = cov * 10, intlPts = intl * 15;
    const score = reg + covPts + intlPts;
    const grade = score >= 430 ? 'S' : score >= 360 ? 'A' : score >= 290 ? 'B' : 'C';
    $('finTitle').textContent = reg >= REG_CAP ? L('350 人滿員成功！🎉', 'Sold out at 350! 🎉') : L('活動順利落幕！', 'The event is a wrap!');
    artInto($('finArt'), 'success', finaleFallbackSVG('success'));
    $('finGrade').textContent = grade;
    $('finGrade').className = 'grade';
    $('finDesc').textContent = L(`${playerName} 總召——`, `Chief ${playerName} — `) + ({
      S: L('傳說級的一屆！連走廊都是精彩的討論。', 'a legendary edition! Even the hallway track was on fire.'),
      A: L('賓主盡歡，社群都在敲碗明年。', 'everyone went home happy, and the community is already asking about next year.'),
      B: L('穩穩的一場好活動，還有進步空間。', 'a solid event, with room to grow.'),
      C: L('驚險過關！明年會更好。', 'a close call — next year will be better!'),
    })[grade];
    rows.push(`<div><span>${L('報名人數', 'Signups')}</span><b>${reg}</b></div>`);
    rows.push(`<div><span>${L(`Tag 多樣性（${cov}/6 × 10）`, `Tag diversity (${cov}/6 × 10)`)}</span><b>${covPts}</b></div>`);
    rows.push(`<div><span>${L(`國際講者（${intl} × 15）`, `International speakers (${intl} × 15)`)}</span><b>${intlPts}</b></div>`);
    rows.push(`<div><span>${L('總分', 'Total score')}</span><b>${score}</b></div>`);
    $('finScores').innerHTML = rows.join('');
    $('finSlogan').textContent = L('「我們 iPlayground 見！」', '"See you at iPlayground!"');
    burstConfetti(); setTimeout(burstConfetti, 600); setTimeout(burstConfetti, 1200);
  }
  fin.classList.add('show');
}

const POINTER_ANGLE = -Math.PI / 2;

function poolName(i) { return wheelMode === 'speaker' ? nm(SPEAKER_CARDS[i]) : STAFF_CARDS[i].name; }
function segFill(i, poolIdx) {
  if (wheelMode === 'staff') return i % 2 ? '#1A1A1A' : '#111111';
  const a = accentOf(SPEAKER_CARDS[poolIdx]);
  if (a) return ACCENT_FILL[a];
  return i % 2 ? '#1A1A1A' : '#111111';
}
function labelColor(poolIdx) {
  if (wheelMode === 'staff') return '#FFFFFF';
  const a = accentOf(SPEAKER_CARDS[poolIdx]);
  return a ? ACCENT_INK[a] : '#FFFFFF';
}
function sizeCanvas() {
  const rect = wheelCanvas.getBoundingClientRect();
  if (!rect.width) return;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  wheelCanvas.width = rect.width * dpr;
  wheelCanvas.height = rect.height * dpr;
  drawWheel();
}
function drawWheel() {
  const w = wheelCanvas.width, h = wheelCanvas.height;
  const cx = w / 2, cy = h / 2;
  const R = Math.min(cx, cy) - 6;
  ctx.clearRect(0, 0, w, h);
  const pool = currentPool();
  const n = pool.length;
  if (n === 0) {
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = '#111111'; ctx.fill();
    ctx.strokeStyle = 'rgba(215,255,0,0.28)'; ctx.lineWidth = 2; ctx.stroke();
    return;
  }
  const seg = (Math.PI * 2) / n;
  for (let i = 0; i < n; i++) {
    const a0 = rotation + i * seg;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, a0, a0 + seg); ctx.closePath();
    ctx.fillStyle = i === highlightIdx ? '#D7FF00' : segFill(i, pool[i]);
    ctx.fill();
    ctx.strokeStyle = 'rgba(215,255,0,0.22)'; ctx.lineWidth = 1; ctx.stroke();
  }
  const base = Math.max(11, R * 0.055);
  for (let i = 0; i < n; i++) {
    const mid = rotation + (i + 0.5) * seg;
    const name = poolName(pool[i]);
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(mid);
    let normalized = mid % (Math.PI * 2);
    if (normalized < 0) normalized += Math.PI * 2;
    const flipped = normalized > Math.PI / 2 && normalized < Math.PI * 1.5;
    if (flipped) { ctx.rotate(Math.PI); ctx.textAlign = 'left'; } else { ctx.textAlign = 'right'; }
    ctx.textBaseline = 'middle';
    let fs = base;
    ctx.font = `700 ${fs}px ${'-apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, "PingFang TC", sans-serif'}`;
    const maxW = R * 0.52;
    const tw = ctx.measureText(name).width;
    if (tw > maxW) {
      fs = Math.max(9, fs * maxW / tw);
      ctx.font = `700 ${fs}px ${'-apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, "PingFang TC", sans-serif'}`;
    }
    ctx.fillStyle = i === highlightIdx ? '#000000' : labelColor(pool[i]);
    ctx.fillText(name, flipped ? -R * 0.94 : R * 0.94, 0);
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(215,255,0,0.45)'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#000000'; ctx.fill();
}
function nextFrame(cb) {
  let done = false;
  const raf = requestAnimationFrame(() => { if (!done) { done = true; clearTimeout(to); cb(performance.now()); } });
  const to = setTimeout(() => { if (!done) { done = true; cancelAnimationFrame(raf); cb(performance.now()); } }, 60);
}
function poolPosAtPointer() {
  const n = currentPool().length;
  const seg = (Math.PI * 2) / n;
  let a = (POINTER_ANGLE - rotation) % (Math.PI * 2);
  if (a < 0) a += Math.PI * 2;
  return Math.floor(a / seg) % n;
}
function spinWheel(mode, winnerIdx, onDone) {
  if (spinning) return;
  wheelMode = mode;
  highlightIdx = -1;
  const pool = currentPool();
  const winner = pool.indexOf(winnerIdx);
  const n = pool.length;
  const seg = (Math.PI * 2) / n;
  const card = mode === 'speaker' ? SPEAKER_CARDS[winnerIdx] : STAFF_CARDS[winnerIdx];
  if (card.photo) new Image().src = card.photo;

  const jitter = (Math.random() * 0.7 - 0.35) * seg;
  const target = POINTER_ANGLE - (winner + 0.5) * seg + jitter;
  const turns = reducedMotion ? 1 : 4 + Math.floor(Math.random() * 2);
  let final = target;
  while (final < rotation + turns * Math.PI * 2) final += Math.PI * 2;

  const start = rotation, delta = final - start;
  const dur = reducedMotion ? 500 : 2400 + Math.random() * 600;
  let lastTickPos = poolPosAtPointer();

  spinning = true;
  $('wheelMode').innerHTML = mode === 'speaker'
    ? L(`正在邀請 <b>講者</b>……（池內剩 ${n} 位）`, `Inviting a <b>speaker</b>… (${n} left in pool)`)
    : L(`正在招募 <b>工作人員</b>……（池內剩 ${n} 位）`, `Recruiting <b>staff</b>… (${n} left in pool)`);
  $('wheelOverlay').classList.add('show');
  sizeCanvas();
  render();

  let t0 = null;
  function frame(now) {
    if (t0 === null) t0 = now;
    const t = Math.min(1, (now - t0) / dur);
    const ease = 1 - Math.pow(1 - t, 3.2);
    rotation = start + delta * ease;
    drawWheel();
    const p = poolPosAtPointer();
    if (p !== lastTickPos) { tick(); lastTickPos = p; }
    if (t < 1) { nextFrame(frame); }
    else {
      rotation = final % (Math.PI * 2);
      spinning = false;
      highlightIdx = winner;
      drawWheel();
      fanfare();
      if (!reducedMotion) burstConfetti();
      setTimeout(() => {
        highlightIdx = -1;
        $('wheelOverlay').classList.remove('show');
        onDone();
      }, reducedMotion ? 0 : 700);
    }
  }
  setTimeout(() => nextFrame(frame), reducedMotion ? 0 : 350);
}

/* ═══════════ 音效 ═══════════ */
let actx = null;
function audio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx; }
function tick() {
  try {
    const a = audio(), o = a.createOscillator(), g = a.createGain();
    o.type = 'square'; o.frequency.value = 1600;
    g.gain.setValueAtTime(0.03, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.03);
    o.connect(g).connect(a.destination);
    o.start(); o.stop(a.currentTime + 0.035);
  } catch (e) {}
}
function fanfare() {
  try {
    const a = audio();
    [523.25, 659.25, 880].forEach((f, i) => {
      const o = a.createOscillator(), g = a.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      const t = a.currentTime + i * 0.09;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.12, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
      o.connect(g).connect(a.destination);
      o.start(t); o.stop(t + 0.45);
    });
  } catch (e) {}
}

/* ═══════════ 彩帶 ═══════════ */
const confettiCanvas = $('confetti');
const cctx = confettiCanvas.getContext('2d');
let particles = [], confettiRunning = false;
function sizeConfetti() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  confettiCanvas.width = innerWidth * dpr;
  confettiCanvas.height = innerHeight * dpr;
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
function burstConfetti() {
  sizeConfetti();
  const colors = ['#D7FF00', '#FFFFFF', '#D9D9D9', '#9DBB00'];
  const rect = wheelCanvas.getBoundingClientRect();
  const wheelVisible = rect.width > 0 && $('wheelOverlay').classList.contains('show');
  const ox = wheelVisible ? rect.left + rect.width / 2 : innerWidth / 2;
  const oy = wheelVisible ? rect.top + rect.height / 2 : innerHeight / 2;
  for (let i = 0; i < 120; i++) {
    const ang = Math.random() * Math.PI * 2, sp = 4 + Math.random() * 9;
    particles.push({ x: ox, y: oy, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 3,
      w: 4 + Math.random() * 6, h: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.3,
      c: colors[Math.floor(Math.random() * colors.length)], life: 1 });
  }
  if (!confettiRunning) { confettiRunning = true; requestAnimationFrame(confettiFrame); }
}
function confettiFrame() {
  cctx.clearRect(0, 0, innerWidth, innerHeight);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.vx *= 0.99;
    p.rot += p.vr; p.life -= 0.011;
    cctx.save(); cctx.translate(p.x, p.y); cctx.rotate(p.rot);
    cctx.globalAlpha = Math.max(0, p.life);
    cctx.fillStyle = p.c;
    cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cctx.restore();
  }
  if (particles.length) requestAnimationFrame(confettiFrame);
  else { confettiRunning = false; cctx.clearRect(0, 0, innerWidth, innerHeight); }
}
